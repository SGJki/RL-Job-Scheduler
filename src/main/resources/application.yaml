logging:
  file:
    name: logs/app.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{traceId}] %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [%X{traceId}] %msg%n"

server:
  port: ${MASTER_PORT:8082}

rpc:
  server:
    port: 9000

spring:
  application:
    name: rl-master
  cloud:
    nacos:
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:599500}
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  datasource:
    url: jdbc:mysql://localhost:3306/testdb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driverClassName: com.mysql.cj.jdbc.Driver
    username: root
    password: 599500
  data:
    redis:
      host: localhost
      port: 6379
#      password: ${REDIS_PASSWORD:599500} # 默认为 599500，优先使用 REDIS_PASSWORD 环境变量
      database: 0
      timeout: 5000ms
  sql:
      init:
        mode: always
        platform: mysql
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
security:
  jwt:
    secret: ${JWT_SECRET:rl-job-scheduler-dev-secret-rl-job-scheduler-dev-secret}
  gateway:
    enabled: ${GATEWAY_TRUST_HEADERS:true}
    require: ${GATEWAY_REQUIRE:true}
    shared-secret: ${GATEWAY_SHARED_SECRET:rl-gateway-dev-shared-secret599500}
    max-skew-seconds: ${GATEWAY_MAX_SKEW_SECONDS:300}
mybatis-plus:
  configuration:
    auto-mapping-behavior: full
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

