<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - RL Training Platform</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .card {
            width: 400px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header bg-primary text-white text-center">
        <h4>RL Training Platform</h4>
    </div>
    <div class="card-body">
        <ul class="nav nav-tabs mb-3" id="authTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">登录</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">注册</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabContent">
            <!-- 登录表单 -->
            <div class="tab-pane fade show active" id="login" role="tabpanel">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginUsername" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="loginUsername" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="loginPassword" class="form-label">密码</label>
                        <input type="password" class="form-control" id="loginPassword" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">登录</button>
                </form>
            </div>

            <!-- 注册表单 -->
            <div class="tab-pane fade" id="register" role="tabpanel">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="regUsername" class="form-label">用户名</label>
                        <input type="text" class="form-control" id="regUsername" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">密码</label>
                        <input type="password" class="form-control" id="regPassword" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">注册</button>
                </form>
            </div>
        </div>

        <div id="message" class="mt-3 text-center"></div>
    </div>
</div>

<!-- jQuery & Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    $(document).ready(function() {
        // 登录逻辑
        $('#loginForm').on('submit', function(e) {
            e.preventDefault();
            const data = {
                username: $('#loginUsername').val(),
                password: $('#loginPassword').val()
            };

            $.ajax({
                url: '/api/auth/login',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    $('#message').html('<span class="text-success">登录成功，正在跳转...</span>');
                    // Cookie 已经由后端 Set-Cookie 设置，直接跳转即可
                    setTimeout(function() {
                        window.location.href = '/';
                    }, 1000);
                },
                error: function(xhr) {
                    $('#message').html('<span class="text-danger">' + xhr.responseText + '</span>');
                }
            });
        });

        // 注册逻辑
        $('#registerForm').on('submit', function(e) {
            e.preventDefault();
            const data = {
                username: $('#regUsername').val(),
                password: $('#regPassword').val()
            };

            $.ajax({
                url: '/api/auth/register',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    $('#message').html('<span class="text-success">注册成功，请切换到登录页进行登录</span>');
                    $('#registerForm')[0].reset();
                },
                error: function(xhr) {
                    $('#message').html('<span class="text-danger">' + xhr.responseText + '</span>');
                }
            });
        });
    });
</script>

</body>
</html>
