<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务暂不可用</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: min(720px, 92vw);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        code {
            background: #f1f3f5;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header bg-warning-subtle">
        <h5 class="mb-0">服务暂不可用</h5>
    </div>
    <div class="card-body">
        <p class="mb-2">网关已收到请求，但后端服务暂时不可用（可能是超时、网络抖动、实例下线或服务重启中）。</p>
        <p class="mb-3">请稍后刷新重试。若需要排查，请提供下方 TraceId。</p>
        <div class="mb-3">
            <span class="me-2">TraceId:</span>
            <code id="traceId">-</code>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary" onclick="location.reload()">刷新重试</button>
            <a class="btn btn-outline-secondary" href="/login">返回登录</a>
        </div>
    </div>
</div>

<script>
    (function () {
        const params = new URLSearchParams(window.location.search);
        const trace = params.get('traceId');
        if (trace) {
            document.getElementById('traceId').textContent = trace;
        }
    })();
</script>
</body>
</html>
